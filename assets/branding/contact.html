<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1180px; height: 560px; background: #26262B; overflow: hidden;
    font-family: Arial, Helvetica, sans-serif; }
  .row { display: flex; gap: 40px; padding: 48px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .icon { width: 320px; height: 320px; border-radius: 72px; overflow: hidden;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45); }
  .icon img { width: 320px; height: 320px; display: block; }
  .label { color: #E7E7EA; font-size: 30px; font-weight: 700; letter-spacing: 1px; }
  .sub { color: #9A9AA2; font-size: 19px; margin-top: -10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col">
      <div class="icon"><img src="icon-v1.svg"></div>
      <div class="label">V1 — Single tile</div>
      <div class="sub">clean &amp; minimal</div>
    </div>
    <div class="col">
      <div class="icon"><img src="icon-v2.svg"></div>
      <div class="label">V2 — Stacked tiles</div>
      <div class="sub">playful, dynamic</div>
    </div>
    <div class="col">
      <div class="icon"><img src="icon-v3.svg"></div>
      <div class="label">V3 — Cipher grid</div>
      <div class="sub">puzzle board</div>
    </div>
  </div>
</body>
</html>
